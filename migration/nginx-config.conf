# Grok2API Nginx 配置
# 文件位置: /etc/nginx/sites-available/grok2api
# 域名: grokapi.ai.org.kg

# HTTP -> HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name grokapi.ai.org.kg;

    # Let's Encrypt ACME 验证
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 服务器配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grokapi.ai.org.kg;

    # SSL 证书（由 certbot 自动配置）
    ssl_certificate /etc/letsencrypt/live/grokapi.ai.org.kg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grokapi.ai.org.kg/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日志
    access_log /var/log/nginx/grok2api_access.log;
    error_log /var/log/nginx/grok2api_error.log;

    # 客户端上传大小限制（用于图片/视频上传）
    client_max_body_size 100M;
    client_body_buffer_size 10M;

    # 反向代理到 grok2api
    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        
        # WebSocket 支持（用于图片生成等功能）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 超时设置（适配长时间运行的请求，如视频生成）
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
        
        # 缓冲设置（关闭缓冲以支持流式响应）
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_buffer_size 4k;
    }

    # 静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|mp4|webm)$ {
        proxy_pass http://127.0.0.1:18080;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查端点（可选）
    location /health {
        proxy_pass http://127.0.0.1:18080;
        access_log off;
    }
}
